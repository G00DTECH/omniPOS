<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 320px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 14px;
            color: #333;
        }
        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 16px;
        }
        .header h1 { font-size: 16px; font-weight: 600; }
        .header p { font-size: 12px; opacity: 0.9; margin-top: 4px; }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 12px;
            background: #f5f5f5;
        }
        .stat {
            text-align: center;
            padding: 8px;
            background: white;
            border-radius: 6px;
        }
        .stat-value { font-size: 20px; font-weight: 600; color: #667eea; }
        .stat-label { font-size: 10px; color: #666; margin-top: 2px; }

        .actions {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-primary:hover { background: #5a6fd8; }
        .btn-secondary {
            background: #e9ecef;
            color: #333;
        }
        .btn-secondary:hover { background: #dee2e6; }
        .btn-success {
            background: #28a745;
            color: white;
        }

        .products {
            max-height: 250px;
            overflow-y: auto;
            border-top: 1px solid #eee;
        }
        .product-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border-bottom: 1px solid #f0f0f0;
            gap: 10px;
        }
        .product-item:hover { background: #f9f9f9; }
        .product-img {
            width: 40px;
            height: 40px;
            object-fit: cover;
            border-radius: 4px;
            background: #eee;
        }
        .product-info { flex: 1; min-width: 0; }
        .product-name {
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .product-price { color: #28a745; font-size: 13px; }
        .product-confidence {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            background: #e9ecef;
        }
        .product-confidence.high { background: #d4edda; color: #155724; }
        .product-confidence.medium { background: #fff3cd; color: #856404; }
        .product-confidence.low { background: #f8d7da; color: #721c24; }

        .empty {
            padding: 30px;
            text-align: center;
            color: #666;
        }
        .empty-icon { font-size: 32px; margin-bottom: 8px; }

        .footer {
            padding: 10px;
            text-align: center;
            font-size: 11px;
            color: #999;
            border-top: 1px solid #eee;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>POS Product Detector</h1>
        <p id="site-name">Scanning...</p>
    </div>

    <div class="stats">
        <div class="stat">
            <div class="stat-value" id="total-count">-</div>
            <div class="stat-label">Products</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="high-count">-</div>
            <div class="stat-label">High Conf.</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="price-count">-</div>
            <div class="stat-label">With Price</div>
        </div>
    </div>

    <div class="actions">
        <button class="btn btn-primary" id="rescan-btn">
            <span>🔄</span> Rescan Page
        </button>
        <button class="btn btn-secondary" id="learn-btn">
            <span>🎯</span> Learn Mode (Custom Sites)
        </button>
        <button class="btn btn-success" id="export-btn">
            <span>📋</span> Copy Products JSON
        </button>
    </div>

    <div class="products" id="products-list">
        <div class="empty">
            <div class="empty-icon">📦</div>
            <p>Scanning for products...</p>
        </div>
    </div>

    <div class="footer">
        Universal POS System v1.0
    </div>

    <script src="popup.js"></script>
</body>
</html>
